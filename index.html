<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ナルキ式・作詞連想ツール v7.6</title>
    <style>
        body { font-family: sans-serif; padding: 15px; background: #121212; color: #e0e0e0; margin: 0; }
        .container { max-width: 600px; margin: 0 auto; background: #1e1e1e; padding: 20px; border-radius: 15px; border: 1px solid #333; }
        button { padding: 12px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; margin: 5px 0; }
        .btn-save { background: #2ecc71; color: white; width: 100%; }
        .btn-sub { background: #3498db; color: white; flex: 1; }
        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #444; background: #2a2a2a; color: white; box-sizing: border-box; }
        .word-card { background: #2d2d2d; padding: 10px; border-radius: 8px; margin-bottom: 8px; position: relative; border-left: 4px solid #3498db; }
        .ruby { font-size: 0.8em; color: #aaa; }
        .nav-buttons { display: flex; gap: 10px; margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="container">
    <h2>RHYME STUDIO v7.6</h2>
    
    <div class="nav-buttons">
        <button class="btn-sub" onclick="exportData()">💾 保存(DL)</button>
        <button class="btn-sub" onclick="document.getElementById('fileInput').click()">📂 読込</button>
        <input type="file" id="fileInput" style="display:none" onchange="importFromFile(event)">
    </div>

    <div class="input-section">
        <input type="text" id="newName" placeholder="歌詞（例：青空）">
        <input type="text" id="newRuby" placeholder="かな（例：あおぞら）">
        <button class="btn-save" onclick="addWord()">単語を登録する</button>
    </div>

    <div id="wordList">
        <h3>登録済み単語</h3>
    </div>
</div>

<script>
    // データをブラウザから読み込む
    let words = [];
    try {
        const saved = localStorage.getItem('lyricData');
        if (saved) words = JSON.parse(saved);
    } catch (e) {
        console.error("データ読み込みエラー", e);
        words = [];
    }

    function render() {
        const list = document.getElementById('wordList');
        list.innerHTML = `<h3>登録済み単語 (${words.length}件)</h3>`;
        
        words.forEach((w, index) => {
            const card = document.createElement('div');
            card.className = 'word-card';
            card.innerHTML = `
                <div class="ruby">${w.ruby}</div>
                <div style="font-weight:bold;">${w.name}</div>
                <button onclick="deleteWord(${index})" style="position:absolute; right:10px; top:10px; background:none; color:#e74c3c; border:none;">✕</button>
            `;
            list.appendChild(card);
        });
        // ブラウザに保存
        localStorage.setItem('lyricData', JSON.stringify(words));
    }

    function addWord() {
        const name = document.getElementById('newName').value.trim();
        const ruby = document.getElementById('newRuby').value.trim();
        
        if(!name || !ruby) {
            alert("歌詞とかなの両方を入力してください");
            return;
        }

        words.push({name, ruby});
        document.getElementById('newName').value = '';
        document.getElementById('newRuby').value = '';
        render();
    }

    function deleteWord(index) {
        if(confirm('削除しますか？')) {
            words.splice(index, 1);
            render();
        }
    }

    function exportData() {
        const data = JSON.stringify(words, null, 2);
        const blob = new Blob([data], {type: 'application/json'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `lyrics_data.json`;
        a.click();
    }

    function importFromFile(e) {
        const file = e.target.files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = function(event) {
            try {
                words = JSON.parse(event.target.result);
                render();
            } catch(err) { alert('ファイルが壊れているか、形式が違います'); }
        };
        reader.readAsText(file);
    }

    // 最初に表示
    render();
</script>

</body>
</html>
